from playwright.sync_api import sync_playwright

URL = "https://stock-prediction-r5fwsua8s6pwfhfwwigems.streamlit.app/" 
def wake_app():
    with sync_playwright() as p:
        browser = p.chromium.launch(headless=True)
        page = browser.new_page()
        page.goto(URL, timeout=120000)
        page.wait_for_timeout(5000)
        
        # Click the wake-up button if present
        wake_btn = page.get_by_role("button", name="Yes, get this app back up!")
        if wake_btn.count() > 0:
            print("WAKE - App was sleeping, clicking button")
            wake_btn.click()
            page.wait_for_timeout(60000)
        else:
            print("OK - App was already awake")
        
        browser.close()

if __name__ == "__main__":
    wake_app()
